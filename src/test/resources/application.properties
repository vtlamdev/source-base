spring.datasource.url=jdbc:h2:mem:sourcebase;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false

spring.cache.type=simple

source-base.security.permit-all=false
source-base.security.jwt.token-expiration-time=900
source-base.security.jwt.refresh-token-exp-time=604800
source-base.security.jwt.token-issuer=test-source-base
