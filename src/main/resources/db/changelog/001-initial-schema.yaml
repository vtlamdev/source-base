databaseChangeLog:
  - changeSet:
      id: 001-create-admin-settings
      author: codex
      changes:
        - createTable:
            tableName: admin_settings
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_time
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: tenant_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: settings_key
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: json_value
                  type: text
        - addUniqueConstraint:
            tableName: admin_settings
            columnNames: tenant_id, settings_key
            constraintName: uq_admin_settings_tenant_key

  - changeSet:
      id: 002-create-tb-user
      author: codex
      changes:
        - createTable:
            tableName: tb_user
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_time
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
              - column:
                  name: tenant_id
                  type: uuid
              - column:
                  name: customer_id
                  type: uuid
              - column:
                  name: authority
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: varchar(255)
              - column:
                  name: last_name
                  type: varchar(255)
              - column:
                  name: phone
                  type: varchar(255)
              - column:
                  name: additional_info
                  type: text
        - addUniqueConstraint:
            tableName: tb_user
            columnNames: email
            constraintName: uq_tb_user_email

  - changeSet:
      id: 003-create-user-credentials
      author: codex
      changes:
        - createTable:
            tableName: user_credentials
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_time
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
              - column:
                  name: enabled
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: activate_token
                  type: varchar(255)
              - column:
                  name: activate_token_exp_time
                  type: bigint
              - column:
                  name: reset_token
                  type: varchar(255)
              - column:
                  name: reset_token_exp_time
                  type: bigint
              - column:
                  name: additional_info
                  type: text
              - column:
                  name: last_login_ts
                  type: bigint
              - column:
                  name: failed_login_attempts
                  type: integer
        - addUniqueConstraint:
            tableName: user_credentials
            columnNames: user_id
            constraintName: uq_user_credentials_user_id
        - addUniqueConstraint:
            tableName: user_credentials
            columnNames: activate_token
            constraintName: uq_user_credentials_activate_token
        - addUniqueConstraint:
            tableName: user_credentials
            columnNames: reset_token
            constraintName: uq_user_credentials_reset_token
        - addForeignKeyConstraint:
            baseTableName: user_credentials
            baseColumnNames: user_id
            constraintName: fk_user_credentials_user
            referencedTableName: tb_user
            referencedColumnNames: id
            onDelete: CASCADE
